<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreWeb.id</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
</head>
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. PENGATURAN UMUM & VARIABEL --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #242425;
            --accent: #00bcd4;
            --text-main: #e5ff00;
            --text-sec: #ffffff;
            --border-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* --- 2. HEADER --- */
        header {
            width: 100%;
            height: 60px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            overflow: hidden; /* Penting agar teks di luar layar tidak terlihat */
            position: relative;
            z-index: 500;
            flex-shrink: 0; 
        }

        .marquee-content {
            display: flex;
            align-items: center;
            white-space: nowrap;
            position: absolute;
            /* Mulai dari pojok KANAN layar */
            left: 100%;
            /* Kecepatan 12 detik (cepat tapi tidak kelihatan lama) */
            animation: slideLeft 38s linear infinite;
        }

        .marquee-img { height: 35px; width: auto; margin-right: 15px; flex-shrink: 0; }
        
        .marquee-text { 
            font-size: 0.95rem; 
            color: var(--text-sec); 
            font-weight: 500; 
        }
        
        .separator {
            margin: 0 15px;
            color: var(--accent);
            font-weight: bold;
        }

        .marquee-copyright {
            font-size: 0.85rem;
            color: #aaa;
            font-weight: 400;
        }

        /* ANIMASI DIPERBAIKI */
        @keyframes slideLeft {
            /* Posisi Awal: Di Kanan (0 relatif terhadap left: 100%) */
            0% {
                transform: translateX(0);
            }
            /* Posisi Akhir: Geser ke kiri sejauh lebar layar + lebar teks.
               -100vw (lebar layar) - 100% (lebar teks) agar benar-benar habis keluar. */
            100% {
                transform: translateX(calc(-100vw - 100%));
            }
        }

        /* --- 3. AREA UTAMA (MAIN) --- */
        main {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 10px;
            overflow: hidden;
            width: 100%;
            min-height: 0;
        }

        /* --- 4. TATA LETAK DESKTOP --- */
        .content-wrapper {
            position: relative;
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16 / 9; 
            max-height: 100%;
            margin: auto;
        }

        .grid-wrapper {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 10px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            z-index: 2;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }
        
        .card:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22%; 
            aspect-ratio: 1/1; 
            background-color: var(--bg-card);
            border: 5px solid var(--accent);
            border-radius: 50%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.6);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .center-logo:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
        }

        .center-logo img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* --- 5. MODAL --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 28px; cursor: pointer; color: #fff; }
        .close-modal:hover { color: var(--accent); }
        
        /* --- 6. FOOTER --- */
        footer {
            display: none;
        }

        /* --- 7. RESPONSIVE --- */
        @media (max-width: 992px) {
            header { height: 50px; }
            .marquee-img { height: 25px; margin-right: 10px; }
            .marquee-text { font-size: 0.8rem; }
            .marquee-copyright { font-size: 0.75rem; }
            
            .content-wrapper {
                width: 95%; 
                aspect-ratio: 16 / 9;
                max-height: 100%;
            }

            .grid-wrapper {
                gap: 10px;
                padding: 5px;
            }

            .center-logo {
                width: 25%;
                border-width: 3px;
            }
        }

        @media (max-width: 600px) {
            .content-wrapper { width: 98%; }
            .grid-wrapper { gap: 5px; }
            .center-logo { width: 28%; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="marquee-content">
            <!-- Logo Kecil -->
            <img src="ChatGPT Image 31 Mar 2026, 01.40.30.png" onerror="this.style.display='none'" alt="Logo" class="marquee-img">
            
            <!-- Teks Sambutan -->
            <span class="marquee-text">Selamat datang di CoreWeb.id, pusat penghubung utama yang mengintegrasikan seluruh sistem dalam satu akses terpadu.</span>
            
            <!-- Pemisah -->
            <span class="separator">|</span>
            
            <!-- Teks Hak Cipta -->
            <span class="marquee-copyright">© 2026 CoreWeb.id - Hak Cipta Dilindungi | Dikembangkan oleh Fajri Munawar</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="content-wrapper">
            <!-- LOGO LINGKARAN -->
            <div class="center-logo" onclick="openModal('JRI MUNAWAR GROUP')">
                <img src="WhatsApp Image 2026-03-04 at 16.57.28.jpeg" alt="Logo JRI">
            </div>

            <!-- KOTAK-KOTAK (GRID) -->
            <div class="grid-wrapper">
                <div class="card" onclick="openModal('UNEVRAS')">
                    <img src="Bold yellow text on white background.png" alt="Unevras">
                </div>
                <div class="card" onclick="openModal('KONEKDA')">
                    <img src="ChatGPT Image Mar 29, 2026, 01_03_17 AM.png" alt="Konekda">
                </div>
                <div class="card" onclick="openModal('ZEARVIS')">
                    <img src="ChatGPT Image Mar 31, 2026, 12_29_43 AM.png" alt="ZEARVIS">
                </div>
                <div class="card" onclick="openModal('AEXIS')">
                    <img src="ChatGPT Image 31 Mar 2026, 00.20.49.png" alt="AEXIS">
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER (Hidden) -->
    <footer>
        <p>© 2026 Corelink.id - Hak Cipta Dilindungi | Dikembangkan oleh Fajri Munawar</p>
    </footer>

    <!-- MODAL -->
    <div id="modalOverlay" class="modal">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="mTitle" style="color:var(--accent); margin-bottom:10px;">Judul</h2>
            <p id="mDesc" style="color:#bbb;">Keterangan</p>
        </div>
    </div>

    <script>
        function openModal(title) {
            const modal = document.getElementById('modalOverlay');
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mDesc').innerText = title === 'JRI MUNAWAR GROUP' 
                ? "Pusat grup kami sedang dalam pengembangan." 
                : "Halaman " + title + " akan segera hadir.";
            modal.style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        window.onclick = function(e) {
            if (e.target == document.getElementById('modalOverlay')) closeModal();
        }
    </script>
</body>
</html>
