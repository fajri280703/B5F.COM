<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corelink.id</title>
    <link rel="icon" type="image/png" href="ChatGPT Image Mar 30, 2026, 03_34_43 PM.png">
    
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. PENGATURAN UMUM & VARIABEL --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #242425;
            --accent: #00bcd4;
            --text-main: #e5ff00;
            --text-sec: #ffffff;
            --border-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            /* PENTING: Kunci tinggi layar dan hilangkan scroll utama */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* --- 2. HEADER --- */
        header {
            width: 100%;
            height: 60px; /* Tinggi tetap */
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
            z-index: 500;
            flex-shrink: 0; /* Supaya header tidak mengecil */
        }

        .marquee-content {
            display: flex;
            align-items: center;
            white-space: nowrap;
            position: absolute;
            animation: slideLeft 18s linear infinite;
        }

        .marquee-img { height: 40px; width: auto; margin-right: 15px; }
        .marquee-text { font-size: 1.1rem; color: var(--text-sec); font-weight: 500; }

        @keyframes slideLeft {
            from { transform: translateX(100vw); }
            to { transform: translateX(-100%); }
        }

        /* --- 3. AREA UTAMA (MAIN) --- */
        main {
            /* PENTING: Area ini mengambil sisa ruang, TANPA scroll */
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 10px; /* Padding kecil agar tidak mepet pinggir */
            overflow: hidden; /* Hilangkan scroll di sini */
            width: 100%;
            min-height: 0; /* Agar item di dalam bisa mengecil (shrink) */
        }

        /* --- 4. TATA LETAK DESKTOP (FULL LAYAR) --- */
        .content-wrapper {
            position: relative;
            /* Lebar maksimal tapi fleksibel */
            width: 90%;
            max-width: 1000px;
            /* PENTING: Gunakan aspect ratio agar kotak proporsional */
            aspect-ratio: 16 / 9; 
            /* Tinggi maksimal disesuaikan dengan ruang main yang tersisa */
            max-height: 100%;
            margin: auto;
        }

        .grid-wrapper {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            padding: 10px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            z-index: 2;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }
        
        .card:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Logo menyesuaikan ukuran wrapper */
            width: 22%; 
            aspect-ratio: 1/1; 
            background-color: var(--bg-card);
            border: 5px solid var(--accent);
            border-radius: 50%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.6);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .center-logo:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.8);
        }

        .center-logo img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* --- 5. MODAL --- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 28px; cursor: pointer; color: #fff; }
        .close-modal:hover { color: var(--accent); }
        
        /* --- 6. FOOTER --- */
        footer {
            width: 100%;
            height: 50px; /* Tinggi tetap */
            background-color: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0; /* Supaya footer tidak mengecil */
            padding: 0 15px;
        }

        footer p {
            color: var(--text-sec);
            font-size: 0.9rem;
            text-align: center;
            margin: 0;
            white-space: nowrap; /* Teks footer tidak turun baris */
        }

        /* --- 7. RESPONSIVE (HP & TABLET) --- */
        /* PERUBAHAN: Di sini saya tidak mengubah jadi kolom (vertical) lagi karena itu bikin scroll. */
        /* Saya mempertahankan GRID agar muat di 1 layar, tapi mengecilkan ukurannya. */
        @media (max-width: 992px) {
            header { height: 50px; }
            .marquee-img { height: 30px; }
            .marquee-text { font-size: 0.85rem; }
            
            footer { height: 40px; }
            footer p { font-size: 0.7rem; }

            /* Wrapper tetap proporsional 16:9 tapi mengambil lebar penuh yang tersedia */
            .content-wrapper {
                width: 95%; 
                aspect-ratio: 16 / 9; /* Paksa tetap kotak lebar, jadi ada ruang samping di HP agar muat tinggi */
                max-height: 100%;
                padding: 0;
            }

            /* Grid tetap 2x2 agar muat di layar pendek */
            .grid-wrapper {
                gap: 10px; /* Jarak dikurangi agar muat */
                padding: 5px;
            }

            /* Logo mengecil proporsional */
            .center-logo {
                width: 25%; /* Sedikit lebih besar relatif terhadap wrapper yang mengecil */
                border-width: 3px;
            }
        }

        @media (max-width: 600px) {
            /* Untuk HP sangat kecil, kita perkecil lagi elemennya */
            .content-wrapper {
                width: 98%;
            }
            .grid-wrapper {
                gap: 5px;
            }
            .center-logo {
                width: 28%;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="marquee-content">
            <!-- Pastikan gambar ada atau ganti dengan placeholder jika tidak muncul -->
            <img src="ChatGPT Image Mar 30, 2026, 03_34_43 PM.png" onerror="this.style.display='none'" alt="Logo" class="marquee-img">
            <span class="marquee-text">Selamat datang di Corelink.id, pusat penghubung utama yang mengintegrasikan seluruh sistem dalam satu akses terpadu.© 2026 Corelink.id - Hak Cipta Dilindungi | Dikembangkan oleh Fajri Munawar</span>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="content-wrapper">
            <!-- LOGO LINGKARAN -->
            <div class="center-logo" onclick="openModal('JRI MUNAWAR GROUP')">
                <img src="WhatsApp Image 2026-03-04 at 16.57.28.jpeg" alt="Logo JRI">
            </div>

            <!-- KOTAK-KOTAK (GRID) -->
            <div class="grid-wrapper">
                <div class="card" onclick="openModal('UNEVRAS')">
                    <img src="Bold yellow text on white background.png" alt="Unevras">
                </div>
                <div class="card" onclick="openModal('KONEKDA')">
                    <img src="ChatGPT Image Mar 29, 2026, 01_03_17 AM.png" alt="Konekda">
                </div>
                <div class="card" onclick="openModal('ZEARVIS')">
                    <img src="ChatGPT Image Mar 31, 2026, 12_29_43 AM.png" alt="ZEARVIS">
                </div>
                <div class="card" onclick="openModal('AEXIS')">
                    <img src="ChatGPT Image 31 Mar 2026, 00.20.49.png" alt="AEXIS">
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Corelink.id - Hak Cipta Dilindungi | Dikembangkan oleh Fajri Munawar</p>
    </footer>

    <!-- MODAL -->
    <div id="modalOverlay" class="modal">
        <div class="modal-box">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="mTitle" style="color:var(--accent); margin-bottom:10px;">Judul</h2>
            <p id="mDesc" style="color:#bbb;">Keterangan</p>
        </div>
    </div>

    <script>
        function openModal(title) {
            const modal = document.getElementById('modalOverlay');
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mDesc').innerText = title === 'JRI MUNAWAR GROUP' 
                ? "Pusat grup kami sedang dalam pengembangan." 
                : "Halaman " + title + " akan segera hadir.";
            modal.style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        // Tutup modal jika klik di luar kotak modal
        window.onclick = function(e) {
            if (e.target == document.getElementById('modalOverlay')) closeModal();
        }
    </script>
</body>
</html>
