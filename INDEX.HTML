<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B5F - Brand</title>
    
    <!-- Google Fonts (Font Modern) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="FAJRI MUNAWAR (4).png">

    <style>
        /* Variabel Warna untuk Tema yang Konsisten */
        :root {
            --bg-color: #121212; /* Abu-abu gelap */
            --surface-color: #1e1e1e; /* Sedikit lebih terang */
            --primary-color: #00bcd4; /* Cyan/Biru Muda */
            --text-color: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
        }

        /* 1. RESET & STYLE DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Poppins', sans-serif; /* Font Modern */
            color: var(--text-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 2. GRID UTAMA */
        .grid-wrapper {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            width: 90%;
            height: 90%;
            max-width: 1200px;
            max-height: 800px;
            gap: 20px; /* Jarak antar kotak */
            position: relative;
            z-index: 1;
        }

        /* 3. ITEM (KOTak) */
        .item {
            position: relative;
            border-radius: 15px; /* Sudut melengkung */
            overflow: hidden;
            cursor: pointer;
            background-color: var(--surface-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Efek Hover pada Item */
        .item:hover {
            transform: translateY(-5px); /* Bergerak sedikit ke atas */
            box-shadow: 0 8px 25px rgba(0, 188, 212, 0.3); /* Bayangan berwarna */
        }

        /* Overlay untuk Efek Hover */
        .item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0, 188, 212, 0.4), rgba(0, 188, 212, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        .item:hover::after {
            opacity: 1;
        }

        /* GAMBAR */
        .item-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .item:hover .item-image {
            transform: scale(1.1); /* Gambar membesar saat hover */
        }

        /* =========================================
           4. LINGKARAN LOGO TENGAH (BISA DIKLIK)
           ========================================= */
        .center-logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            z-index: 100;
            cursor: pointer;
            border: 5px solid var(--bg-color);
            box-shadow: 0 0 0 5px var(--primary-color), 0 10px 30px rgba(0, 188, 212, 0.5);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-color: var(--surface-color);
        }

        /* Efek Hover pada Logo Tengah */
        .center-logo-container:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: 0 0 0 5px var(--primary-color), 0 15px 40px rgba(0, 188, 212, 0.7);
        }

        .center-logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* =========================================
           5. MODAL POP-UP (DESAIN BARU)
           ========================================= */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px); /* Efek blur pada background */
        }

        .modal-content {
            background-color: var(--surface-color);
            margin: 10% auto;
            padding: 50px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--primary-color), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-content p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .close {
            color: var(--text-secondary);
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 35px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .close:hover,
        .close:focus {
            color: var(--primary-color);
            cursor: pointer;
        }
        
        /* 6. RESPONSIVE UNTUK HP */
        @media (max-width: 768px) {
            .grid-wrapper {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
                gap: 15px;
                width: 95%;
                height: 95%;
            }
            .center-logo-container {
                width: 120px;
                height: 120px;
                border-width: 3px;
                box-shadow: 0 0 0 3px var(--primary-color), 0 5px 15px rgba(0, 188, 212, 0.4);
            }
            .modal-content {
                padding: 30px;
                margin: 30% auto;
            }
            .modal-content h1 {
                font-size: 2rem;
            }
        }

    </style>
</head>
<body>

    <div class="grid-wrapper">
        <!-- UNEVRAS -->
        <div class="item" onclick="showModal('UNEVRAS')">
            <img src="Bold yellow text on white background.png" alt="Unevras" class="item-image">
        </div>

        <!-- KONEKDA -->
        <div class="item" onclick="showModal('KONEKDA')">
            <img src="ChatGPT Image Mar 29, 2026, 01_03_17 AM.png" alt="Konekda" class="item-image">
        </div>

        <!-- AEVIS -->
        <div class="item" onclick="showModal('AEVIS')">
            <img src="ChatGPT Image 29 Mar 2026, 00.15.36.png" alt="Aevis" class="item-image">
        </div>

        <!-- GARTASA -->
        <div class="item" onclick="showModal('GARTARA')">
            <img src="ChatGPT Image 29 Mar 2026, 16.25.26.png" alt="Gartasa" class="item-image">
        </div>
    </div>

    <!-- LINGKARAN LOGO DI TENGAH (SUDAH BISA DIKLIK) -->
    <div class="center-logo-container" onclick="showModal('JRI MUNAWAR GROUP')">
        <img src="WhatsApp Image 2026-03-04 at 16.57.28.jpeg" alt="Logo B5F" class="center-logo-img">
    </div>

    <!-- POP-UP MODAL -->
    <div id="modalPopup" class="modal">
        <div class="modal-content">
            <span class="close" onclick="hideModal()">&times;</span>
            <h1 id="modal-title">COMING SOON</h1>
            <p id="modal-text">Halaman ini sedang dalam pembangunan tidak lama lagi.</p>
        </div>
    </div>

    <script>
        // Fungsi untuk menampilkan modal dengan pesan dinamis
        function showModal(brand) {
            const modal = document.getElementById("modalPopup");
            const title = document.getElementById("modal-title");
            const text = document.getElementById("modal-text");

            if (brand === 'JRI MUNAWAR GROUP') {
                title.textContent = "JRI MUNAWAR GROUP";
                text.textContent = "Pintu gerbang kami sedang dalam pembangunan. Segera hadir tidak lama lag!";
            } else {
                title.textContent = brand + " - COMING SOON";
                text.textContent = "Halaman untuk " + brand + " sedang dalam pengembangan website nya.";
            }

            modal.style.display = "block";
        }

        // Fungsi untuk menyembunyikan modal
        function hideModal() {
            document.getElementById("modalPopup").style.display = "none";
        }

        // Menutup modal jika pengguna mengklik di luar area modal
        window.onclick = function(event) {
            const modal = document.getElementById("modalPopup");
            if (event.target == modal) {
                hideModal();
            }
        }
    </script>

</body>
</html>
